name: Setup Android Build Environment
description: Install Java, Gradle, Android SDK, oxipng, and the native icon toolchain.

runs:
  using: composite
  steps:
    - name: Set up Java 21
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: "21"

    - name: Set up Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Install oxipng
      uses: taiki-e/install-action@v2
      with:
        tool: oxipng

    - name: Set up Android SDK
      uses: android-actions/setup-android@v3

    - name: Install Android SDK components
      shell: bash
      run: |
        yes | sdkmanager --licenses
        sdkmanager \
          "platform-tools" \
          "platforms;android-36" \
          "build-tools;36.0.0"

    - name: Install native icon toolchain
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          librsvg2-bin \
          imagemagick \
          icnsutils \
          pngquant

    - name: Make Gradle wrapper executable
      shell: bash
      run: chmod +x ./gradlew
